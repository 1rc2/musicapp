name: Build APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Grant execute permission for gradlew
        run: cd android && chmod +x gradlew
        
      - name: Generate debug keystore
        run: |
          cd android/app
          keytool -genkey -v -keystore debug.keystore -alias musicflow -keyalg RSA -keysize 2048 -validity 10000 -storepass musicflow123 -keypass musicflow123 -dname "CN=MusicFlow, OU=MusicFlow, O=MusicFlow, L=Beijing, ST=Beijing, C=CN"
          ls -la debug.keystore
        
      - name: Build APK
        run: cd android && ./gradlew assembleRelease --stacktrace 2>&1
          
      - name: List all build outputs
        run: |
          echo "=== Listing build/outputs directory ==="
          ls -la android/app/build/outputs/ || echo "outputs dir not found"
          echo "=== Listing apk directory recursively ==="
          ls -laR android/app/build/outputs/apk/ || echo "apk dir not found"
          echo "=== Finding all APK files ==="
          find android -name "*.apk" -type f
          echo "=== APK file count ==="
          find android -name "*.apk" -type f | wc -l
        
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
